<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- CSS only -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
  <link rel="stylesheet" type="text/css" href="/static/style.css">
</head>
<body>
  <div>
    <h1 >The iCE Bot</h1>
    <div>
  <div id="chatbox">
    <p class="botText"><span>Hi! I'm {{botname}}. How can I help you today?.</span></p>
  </div>
  <div id="userInput">
    <input id="textInput" type="text" name="msg" placeholder="Message">
    <br>
    <button type = "button" class="btn btn-success" style="position:absolute;padding-right:14px;" onclick="startConverting();">    <i class="bi bi-mic-fill paddingRight"></i>Record
    </button>
    <!-- click this button to stop converting-->
    <button type = "button" class="btn btn-danger marginLeft" style="position:absolute; left:37%;" onclick="stopConverting();"><i class="bi bi-stop-circle paddingRight"></i>Stop</button>
    <button id="buttonInput" class="btn btn-primary" type="submit" style="left: 61%;
    
    position: absolute;">
     Send
     <i class="bi bi-arrow-right-circle-fill"></i>
    </button>

  </div>
</div>
</div>
  <div style="margin-left:20px;">
    <br>
    <br>
    <br>
    <br>
    <h6>Click on the "Choose File" button to upload a file:</h6>
    <form id = "formId" action = "http://localhost:5500/uploader" method = "POST"
          enctype = "multipart/form-data">
          <label class="custom-file-upload btn btn-outline-secondary">
      <input type = "file" id="file-upload" name = "file" />Choose File

    </label>
    <span id="file-selected"></span>

      <input type = "submit" class="btn btn-outline-primary" />
    </form>
  </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
<script>
  $('#file-upload').bind('change', function() { var fileName = ''; fileName = $(this).val(); $('#file-selected').html(fileName.replace(/^.*\\/, ""))}) 
  $('#formId' ).submit(
    function( e ) {
        $.ajax( {
            url: 'http://localhost:5500/uploader',
            type: 'POST',
            data: new FormData( this ),
            processData: false,
            contentType: false,
            success: function(result){
                //console.log('uploaded',result);
                alert('File Uploaded Successfully');
                document.getElementById('file-selected').innerHTML='';
              }
        } );
        e.preventDefault();
    } 
);
  var overlay = document.getElementById("overlay");

  function getBotResponse() {
    var rawText = $("#textInput").val();
    var userHtml = '<p class="userText"><span>' + rawText + '</span></p>';
    console.log('rawText',rawText);
    $("#textInput").val("");
    $("#chatbox").append(userHtml);
    document.getElementById('userInput').scrollIntoView({block: 'start', behavior: 'smooth'});
    $.get("/get", { msg: rawText }).done(function(data) {
      var botHtml = '<p class="botText"><span style="white-space:pre-wrap;">' + data + '</span></p>';
      console.log('data',data);
      $("#chatbox").append(botHtml);
      document.getElementById('userInput').scrollIntoView({block: 'start', behavior: 'smooth'});
    });
  }

  var r = document.getElementById('textInput');
  var speechRecognizer = new webkitSpeechRecognition();// a new speech recognition object

  //function to start listening to voice and then convert it to text
  function startConverting () {
    if('webkitSpeechRecognition' in window){

      speechRecognizer.continuous = true;
      speechRecognizer.interimResults = false;
      speechRecognizer.lang = 'en-IN';
      speechRecognizer.start();
      var finalTranscripts = '';
      speechRecognizer.onresult = function(event){
        var interimTranscripts = '';
        for(var i = event.resultIndex; i < event.results.length; i++){
          var transcript = event.results[i][0].transcript;
          transcript.replace("\n", "<br>");
          if(event.results[i].isFinal){
            finalTranscripts = transcript;
          }
          else{
            interimTranscripts += transcript;
          }
        }
        r.value = finalTranscripts ;
      };
      speechRecognizer.onerror = function (event) {
      };
    }else{
      r.innerHTML = 'No browser support. Please upgrade your browser';
    }
  }

  //function to stop listening
  function stopConverting()
  {
    speechRecognizer.stop();
  }

  $("#textInput").keypress(function(e) {
      if ((e.which == 13) && document.getElementById("textInput").value != "" ){
          getBotResponse();
      }
  });
  $("#buttonInput").click(function() {
      if (document.getElementById("textInput").value != "") {
          getBotResponse();
      }
  })
</script>
</html>
